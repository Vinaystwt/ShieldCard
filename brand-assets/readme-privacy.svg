  <path d="M476 203 L482 200 L482 206 Z" fill="#C8833F" opacity="0.6"/>
  <text x="490" y="210" font-family="ui-monospace, monospace" font-size="10" fill="#C8833F" opacity="0.9">raw decision before publication</text>
  <path d="M476 223 L482 220 L482 226 Z" fill="#C8833F" opacity="0.6"/>
  <text x="490" y="230" font-family="ui-monospace, monospace" font-size="10" fill="#C8833F" opacity="0.9">employee private reveal (permit-gated)</text>
