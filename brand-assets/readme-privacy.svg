      <stop offset="0%" stop-color="#D99550"/>
      <stop offset="100%" stop-color="#B06B28"/>
    </linearGradient>
  </defs>

  <rect width="860" height="260" rx="12" fill="#09090B"/>
  <rect width="860" height="260" rx="12" fill="none" stroke="#1E1E24" stroke-width="1"/>

  <text x="430" y="28" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#4A4A52" letter-spacing="0.08em">PRIVACY BOUNDARY</text>

